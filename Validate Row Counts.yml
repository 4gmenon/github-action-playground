steps:
  - name: Validate Row Counts
    run: |
      T1=$(cat table1.txt)
      T2=$(cat table2.txt)
      T3=$(cat table3.txt)

      echo "T1 Count = $T1"
      echo "T2 Count = $T2"
      echo "T3 Count = $T3"

      if [ "$T1" = "$T2" ] && [ "$T1" = "$T3" ]; then
        echo "OK - Row counts match"
      else
        echo "KO - Row counts do not match"
        echo "SELECT *"
        echo "FROM T1, T2, T3"
        echo "WHERE NOT(T1.COUNT_ROWS = T2.COUNT_ROWS AND T1.COUNT_ROWS = T3.COUNT_ROWS)"
        exit 1
      fi
