name: Iterate Table Rows from File

on:
  workflow_dispatch:
    inputs:
      file_to_process:
        description: 'Select the file to process'
        type: choice
        required: true
        options:
          - counts.txt
          - table1.txt
          - table2.txt

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Iterate counts
        working-directory: ${{ github.workspace }}
        run: |
          PREV=""
          LINE_NUM=0

          while read -r COUNT; do
            LINE_NUM=$((LINE_NUM + 1))
            echo "Line $LINE_NUM: $COUNT"
            
            if [ -n "$PREV" ] && [ "$COUNT" != "$PREV" ]; then
              echo "KO - Line $LINE_NUM ($COUNT) does not match previous line ($PREV)"
              exit 1
            fi

            PREV="$COUNT"
          done < ${{ inputs.file_to_process }}

          echo "OK, all counts match"
